<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JudgeMe</title>
    <link href="JudgeMe.css" rel="stylesheet">
</head>
<body>
    <h1 id="heading">JudgeMe</h1>
    
    <div class="all">
        
        <div class="input">
            <h2>Let me know your decision here!</h2>
            <input type="text" id="input" placeholder="For eg: i didn't do my homework">
            <button class="btn" onclick="judge()">Judge</button>
        </div>
        
        <div class="output">
            <h2>I will judge you.</h2>
            <img src="cat_judging1.jpg" alt="picture of judging cat">
          <br>
            <textarea rows="15" cols="30" id="output">cat is judging and will respond in a sec.......</textarea>
        </div>
        
    </div>
    <script src="JudgeMe.js"></script>
</body>
</html>
